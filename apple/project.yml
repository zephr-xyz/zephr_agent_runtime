name: ZephrAgentRuntime
options:
  xcodeVersion: "26.5"
  projectFormat: xcode16_3
settings:
  SWIFT_VERSION: "6.2"
  SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
  SWIFT_APPROACHABLE_CONCURRENCY: true
  SWIFT_STRICT_CONCURRENCY: complete
  ENABLE_USER_SCRIPT_SANDBOXING: true
configFiles:
  Debug: xcconfigs/Debug.xcconfig
  Release: xcconfigs/Release.xcconfig

sdk_settings_base: &sdk_settings_base
  IPHONEOS_DEPLOYMENT_TARGET: "26.0"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  ARCHS[sdk=macosx*]: arm64
  ONLY_ACTIVE_ARCH[sdk=macosx*]: true
  EXCLUDED_ARCHS[sdk=macosx*]: x86_64
  HEADER_SEARCH_PATHS:
    - ../tinylib/zephr_agent_runtime
    - ../tinylib/tinyllm
    - ../tinylib/tinylog
    - $(ZEPHR_NATIVE_DEPS_ROOT)/downloads/litert
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/1_configure/$(CONFIGURATION)/arm64/litert/include
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/1_configure/$(CONFIGURATION)/arm64/litert/abseil-cpp
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/2_installed/$(CONFIGURATION)/arm64/litert/include
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/2_installed/$(CONFIGURATION)/arm64/sentencepiece/include
  HEADER_SEARCH_PATHS[sdk=macosx*]:
    - ../tinylib/zephr_agent_runtime
    - ../tinylib/tinyllm
    - ../tinylib/tinylog
    - $(ZEPHR_NATIVE_DEPS_ROOT)/downloads/litert
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/1_configure/$(CONFIGURATION)/arm64/litert/include
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/1_configure/$(CONFIGURATION)/arm64/litert/abseil-cpp
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/2_installed/$(CONFIGURATION)/arm64/litert/include
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/2_installed/$(CONFIGURATION)/arm64/sentencepiece/include
  LIBRARY_SEARCH_PATHS:
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/2_installed/$(CONFIGURATION)/arm64/litert/lib
    - $(ZEPHR_NATIVE_DEPS_ROOT)/ios/2_installed/$(CONFIGURATION)/arm64/sentencepiece/lib
  LIBRARY_SEARCH_PATHS[sdk=macosx*]:
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/2_installed/$(CONFIGURATION)/arm64/litert/lib
    - $(ZEPHR_NATIVE_DEPS_ROOT)/macos/2_installed/$(CONFIGURATION)/arm64/sentencepiece/lib
  OTHER_LDFLAGS:
    - -lLiteRt
    - -lsentencepiece
    - -framework
    - Metal
  LD_RUNPATH_SEARCH_PATHS:
    - "@executable_path/Frameworks"
    - "@loader_path/Frameworks"
  LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]:
    - "@executable_path/../Frameworks"
    - "@loader_path/../Frameworks"
  ENABLE_USER_SCRIPT_SANDBOXING: true

verify_native_deps_bridge: &verify_native_deps_bridge
  name: Verify native deps bridge
  script: |
    set -euo pipefail
    cd "${SRCROOT}/.."
    .venv/bin/python -m clis.support.dev_environment.native_deps_guard --bridge xcconfig
  basedOnDependencyAnalysis: false

targets:
  zephr_agent_runtime:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - path: sdks/zephr_agent_runtime/Public/ZephrAgentRuntime.h
        group: sdks/zephr_agent_runtime/Public
        headerVisibility: public
      - path: sdks/zephr_agent_runtime/Sources
        group: sdks/zephr_agent_runtime
        includes:
          - "**/*.swift"
          - "**/*.mm"
      - path: ../tinylib/zephr_agent_runtime/public
        group: tinylib/zephr_agent_runtime
        includes:
          - "zephr_agent_c_api.h"
        headerVisibility: public
      - path: ../tinylib/zephr_agent_runtime/core
        group: tinylib/zephr_agent_runtime
        includes:
          - "zephr_agent_c_api.cpp"
        compilerFlags: ["-std=c++20", "-w", "-O2"]
      - path: ../tinylib/zephr_agent_runtime/core
        group: tinylib/zephr_agent_runtime
        buildPhase: none
        includes:
          - "*.hpp"
      - path: ../tinylib/tinyllm/core
        group: tinylib/tinyllm
        buildPhase: none
        includes:
          - "*.h"
          - "*.hpp"
      - path: ../tinylib/tinylog/tinylog.hpp
        group: tinylib/tinylog
        buildPhase: none
      - path: ../data/model_manifests/channels/public.json
        group: sdks/zephr_agent_runtime/Resources/ModelManifests
        buildPhase: resources
    settings:
      base:
        <<: *sdk_settings_base
        PRODUCT_BUNDLE_IDENTIFIER: xyz.zephr.sdks.agent
        PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]: xyz.zephr.sdks.agent.macos
        PRODUCT_NAME: ZephrAgentRuntime
        PRODUCT_MODULE_NAME: ZephrAgentRuntime
        DEFINES_MODULE: true
        BUILD_LIBRARY_FOR_DISTRIBUTION: false
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        ENABLE_MODULE_VERIFIER: true
        ENABLE_MODULE_VERIFIER[sdk=macosx*]: false
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
        SKIP_INSTALL: true
    preBuildScripts:
      - *verify_native_deps_bridge
